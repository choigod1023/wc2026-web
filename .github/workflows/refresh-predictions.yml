name: Refresh predictions

# 대회 기간 하루 몇 번 모델을 돌려 예측 JSON을 갱신한다.
# 무거운 학습이 없는 CPU 작업(약 10~15초)이라 기본 러너로 충분(GPU 불필요).
# 예측 레포(public)를 clone해 파이프라인을 돌리고, 산출 JSON을 이 레포에 커밋한다.
# 같은 레포 push라 별도 토큰(PAT) 없이 GITHUB_TOKEN 만으로 동작 → Vercel 자동 재배포.

on:
  schedule:
    - cron: "0 */6 * * *" # 6시간마다 (UTC) = 한국시간 03·09·15·21시
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: refresh-predictions
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web repo
        uses: actions/checkout@v4

      - name: Checkout predictor repo (public)
        uses: actions/checkout@v4
        with:
          repository: choigod1023/wc2026-predictor
          path: predictor

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: predictor/requirements.txt

      - name: Install dependencies
        run: pip install -r predictor/requirements.txt

      - name: Run pipeline (fetch latest results + recompute)
        working-directory: predictor
        run: python run_pipeline.py --update

      - name: Export JSON to web/data
        run: python predictor/src/export_web.py --out "$GITHUB_WORKSPACE/data"

      - name: Commit & push if changed
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 예측 자동 갱신 ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
